- alias: "Amp - Sync Sensor to Input Helpers"
  id: amp_sync_sensor_to_inputs
  description: "Push polled hardware values into input_number / input_select helpers"
  trigger:
    - platform: state
      entity_id: sensor.amp_state
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.amp_master_volume
      data:
        value: "{{ state_attr('sensor.amp_state', 'master') | int(0) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.amp_bass
      data:
        value: "{{ state_attr('sensor.amp_state', 'bass') | int(24) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.amp_treble
      data:
        value: "{{ state_attr('sensor.amp_state', 'treble') | int(24) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.amp_balance
      data:
        value: "{{ state_attr('sensor.amp_state', 'balance') | int(24) }}"
    - action: input_select.select_option
      target:
        entity_id: input_select.amp_output_mode
      data:
        option: "{{ state_attr('sensor.amp_state', 'output_mode') }}"
    - action: input_select.select_option
      target:
        entity_id: input_select.amp_output_routing
      data:
        option: "{{ state_attr('sensor.amp_state', 'local_amp') }}"
    - action: input_select.select_option
      target:
        entity_id: input_select.amp_digital_mux
      data:
        option: "{{ state_attr('sensor.amp_state', 'digital_mux') }}"

- alias: "Amp - Set Master Volume"
  id: amp_set_master_volume
  trigger:
    - platform: state
      entity_id: input_number.amp_master_volume
  condition:
    - condition: template
      value_template: >
        {{ (trigger.to_state.state | int(0))
           != (state_attr('sensor.amp_state', 'master') | int(-1)) }}
  action:
    - action: shell_command.set_amp_master_volume
    - delay: "00:00:01"
    - action: homeassistant.update_entity
      data:
        entity_id: sensor.amp_state

