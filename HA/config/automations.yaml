- id: eq_sliders_changed
  alias: "EQ: Sliders Moved"
  trigger:
    - platform: state
      entity_id:
        - input_number.eq_filter_31_5
        - input_number.eq_filter_63
        - input_number.eq_filter_125
        - input_number.eq_filter_250
        - input_number.eq_filter_500
        - input_number.eq_filter_1000
        - input_number.eq_filter_2000
        - input_number.eq_filter_4000
        - input_number.eq_filter_8000
        - input_number.eq_filter_16000
  action:
    - action: shell_command.set_eq_sliders_dynamic

- id: eq_preset_syncs_sliders
  alias: "EQ: Profile Syncs Sliders"
  mode: restart
  trigger:
    - platform: state
      entity_id: sensor.amp_eq_profile
  condition:
    # Trigger whenever the data updates, even if it stays on "Manual"
    - condition: template
      value_template: "{{ trigger.to_state.state != 'unknown' and has_value('sensor.amp_eq_profile') }}"
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_31_5
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b31_5') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_63
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b63') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_125
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b125') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_250
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b250') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_500
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b500') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_1000
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b1k') | int(50) }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.eq_filter_2000
      data:
        value: "{{ state_attr('sensor.amp_eq_profile', 'b2k') | int(50) }}"
    - action: input_number.set_value
      target:
