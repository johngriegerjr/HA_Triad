- id: set_pcp_volume_slider
  alias: "Set PCP Volume from Slider"
  trigger:
    - platform: state
      entity_id: input_number.pcp_volume
  condition: []
  action:
    - service: shell_command.set_pcp_volume
  mode: queued
  max: 5

